services:
  webhook:
    build: .
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drive-save.rule=Host(`${WEBHOOK_HOST}`)"
      - "traefik.http.routers.drive-save.entrypoints=web"
      - "traefik.http.services.drive-save.loadbalancer.server.port=8000"

networks:
  proxy:
    external: true
